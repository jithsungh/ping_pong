# Docker Compose for local development/testing
# Usage: docker-compose up --build

version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000

  desktop:
    build:
      context: .
      dockerfile: packages/desktop/Dockerfile
      args:
        - VITE_WS_URL=ws://localhost:3000
    ports:
      - "5174:5174"
    depends_on:
      - server

  mobile:
    build:
      context: .
      dockerfile: packages/mobile/Dockerfile
      args:
        - VITE_WS_URL=ws://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      - server
