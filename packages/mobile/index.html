<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1B5E20">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>PaddleLink - Paddle Controller</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    html, body {
      height: 100%;
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 100%);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      overscroll-behavior: none;
    }
    
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 20px;
    }
    
    .status-bar {
      width: 100%;
      text-align: center;
      padding: 10px;
    }
    
    .connection-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(0,0,0,0.3);
      border-radius: 20px;
      font-size: 14px;
    }
    
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f44336;
    }
    
    .status-dot.connected {
      background: #4CAF50;
    }
    
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
    }
    
    .swing-indicator {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 4px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
      transition: all 0.15s ease;
    }
    
    .swing-indicator.swing-detected {
      background: rgba(76, 175, 80, 0.8);
      border-color: #4CAF50;
      transform: scale(1.1);
    }
    
    .sensor-debug {
      margin-top: 20px;
      font-family: monospace;
      font-size: 12px;
      background: rgba(0,0,0,0.3);
      padding: 15px;
      border-radius: 10px;
      width: 100%;
      max-width: 300px;
    }
    
    .sensor-row {
      display: flex;
      justify-content: space-between;
      margin: 5px 0;
    }
    
    .controls {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 300px;
    }
    
    button {
      padding: 15px 30px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
    }
    
    button:active {
      transform: scale(0.98);
    }
    
    .btn-primary {
      background: #FF6F00;
      color: white;
    }
    
    .btn-secondary {
      background: rgba(255,255,255,0.2);
      color: white;
    }
    
    .room-input {
      display: flex;
      gap: 8px;
      width: 100%;
      justify-content: center;
    }
    
    .room-code-box {
      width: 52px;
      height: 64px;
      padding: 0;
      font-size: 28px;
      text-transform: uppercase;
      text-align: center;
      border: 3px solid rgba(255,255,255,0.4);
      border-radius: 12px;
      background: rgba(255,255,255,0.95);
      color: #1B5E20;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      transition: border-color 0.2s, transform 0.1s;
    }
    
    .room-code-box:focus {
      outline: none;
      border-color: #FF6F00;
      transform: scale(1.05);
    }
    
    .room-code-box::placeholder {
      color: #ccc;
      font-size: 24px;
    }
    
    .server-input {
      width: 100%;
      padding: 12px 15px;
      font-size: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 10px;
      background: rgba(255,255,255,0.9);
      color: #1B5E20;
      text-align: center;
    }
    
    .server-input:focus {
      outline: none;
      border-color: #FF6F00;
    }
    
    .connect-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      width: 100%;
      max-width: 300px;
    }
    
    .form-section {
      width: 100%;
      text-align: center;
    }
    
    .form-label {
      font-size: 12px;
      opacity: 0.8;
      margin-bottom: 8px;
      display: block;
    }
    
    .room-code-label {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    .hidden {
      display: none !important;
    }
    
    .permission-request {
      text-align: center;
      padding: 20px;
    }
    
    .permission-request p {
      margin-bottom: 20px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Permission Request Screen -->
    <div id="permission-screen" class="permission-request">
      <h2>PaddleLink</h2>
      <p>Allow motion sensors to use your phone as a paddle</p>
      <p style="font-size: 12px; margin-top: 15px; opacity: 0.8;">iOS tip: Go to Settings > Accessibility > Touch > Shake to Undo > OFF</p>
      <button id="request-permission" class="btn-primary">Enable Motion</button>
    </div>
    
    <!-- Connection Screen -->
    <div id="connect-screen" class="hidden">
      <div class="status-bar">
        <h2>PaddleLink</h2>
      </div>
      <div class="main-area">
        <div class="connect-form">
          <div class="form-section">
            <span class="room-code-label">Enter Room Code</span>
            <div class="room-input">
              <input type="text" class="room-code-box" id="code-1" maxlength="1" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" inputmode="text" placeholder="-">
              <input type="text" class="room-code-box" id="code-2" maxlength="1" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" inputmode="text" placeholder="-">
              <input type="text" class="room-code-box" id="code-3" maxlength="1" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" inputmode="text" placeholder="-">
              <input type="text" class="room-code-box" id="code-4" maxlength="1" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" inputmode="text" placeholder="-">
            </div>
          </div>
          
          <button id="connect-btn" class="btn-primary" style="width: 100%; margin-top: 10px;">Connect</button>
          
          <div class="form-section" style="margin-top: 20px;">
            <span class="form-label">Server URL (advanced)</span>
            <input type="text" class="server-input" id="server-url" value="wss://paddlelinkserver-production.up.railway.app" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
          </div>
        </div>
      </div>
    </div>
    
    <!-- Game Screen -->
    <div id="game-screen" class="hidden">
      <div class="status-bar">
        <div class="connection-status">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Connecting...</span>
        </div>
      </div>
      
      <div class="main-area">
        <div class="swing-indicator" id="swing-indicator">
          READY
        </div>
        
        <div class="sensor-debug" id="sensor-debug">
          <div class="sensor-row">
            <span>Accel:</span>
            <span id="accel-value">0.0</span>
          </div>
          <div class="sensor-row">
            <span>Speed:</span>
            <span id="speed-value">0.0</span>
          </div>
          <div class="sensor-row">
            <span>Angle:</span>
            <span id="angle-value">0°</span>
          </div>
          <div class="sensor-row">
            <span>Swings:</span>
            <span id="swing-count">0</span>
          </div>
        </div>
      </div>
      
      <div class="controls">
        <button id="calibrate-btn" class="btn-secondary">Calibrate (Hold Flat)</button>
        <button id="disconnect-btn" class="btn-secondary">Leave Room</button>
      </div>
    </div>
  </div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
